<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guide-Recorder Editor</title>
    <link rel="icon" href="./logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel controls">
        <h1>Guide-Recorder Editor</h1>
        <p class="muted">Record screen + interactions, then add zoom and text overlays.</p>

        <div class="row">
          <button id="startBtn">Start Capture</button>
          <button id="stopBtn" disabled>Stop</button>
          <button id="downloadBtn" disabled>Download WebM</button>
          <button id="exportFinalBtn" disabled>Export Final Video</button>
        </div>

        <div class="row">
          <button id="saveProjectBtn" disabled>Download Project JSON</button>
          <label class="file-input">
            Load Project JSON
            <input id="loadProjectInput" type="file" accept="application/json" />
          </label>
          <label class="file-input">
            Load Video File
            <input id="loadVideoInput" type="file" accept="video/webm,video/mp4,video/*" />
          </label>
        </div>

        <div class="status" id="status">Idle</div>
      </section>

      <section class="panel preview-wrap">
        <div class="preview-stage" id="previewStage">
          <video id="previewVideo" playsinline></video>
          <canvas id="overlayCanvas"></canvas>
          <div id="liveKeyPill" class="key-pill hidden"></div>
        </div>
        <div class="preview-controls">
          <button id="playPauseBtn">Play</button>
          <input id="seekBar" type="range" min="0" max="1000" step="1" value="0" />
          <span id="timeLabel">00:00 / 00:00</span>
        </div>
      </section>

      <section class="panel editor">
        <h2>Edit Timeline</h2>

        <div class="editor-grid">
          <div>
            <h3>Cursor Calibration</h3>
            <div class="grid2">
              <label>Offset X (px)<input id="cursorOffsetX" type="number" step="1" value="0" /></label>
              <label>Offset Y (px)<input id="cursorOffsetY" type="number" step="1" value="0" /></label>
            </div>
            <div class="row">
              <label class="file-input">
                Cursor Texture
                <input id="cursorTextureInput" type="file" accept="image/png,image/webp,image/jpeg,image/svg+xml,image/*" />
              </label>
              <button id="cursorTextureClearBtn" type="button">Clear Texture</button>
            </div>
            <div class="grid2">
              <label>Hotspot X (px)<input id="cursorHotspotX" type="number" step="1" value="0" min="0" /></label>
              <label>Hotspot Y (px)<input id="cursorHotspotY" type="number" step="1" value="0" min="0" /></label>
            </div>
            <canvas id="cursorPreviewCanvas" width="140" height="140" class="cursor-preview" title="Click to set cursor hotspot"></canvas>
            <p class="muted">Use this when overlay cursor is shifted from the real cursor in playback.</p>
          </div>

          <div>
            <h3>Add Zoom Segment</h3>
            <div class="grid2">
              <label>Start (s)<input id="zoomStart" type="number" min="0" step="0.1" value="0" /></label>
              <label>End (s)<input id="zoomEnd" type="number" min="0" step="0.1" value="3" /></label>
              <label>Scale<input id="zoomScale" type="number" min="1" step="0.1" value="1.8" /></label>
              <label>Smooth (ms)<input id="zoomEase" type="number" min="0" step="10" value="180" /></label>
            </div>
            <button id="addZoomBtn">Add Zoom</button>
          </div>

          <div>
            <h3>Add Text Overlay</h3>
            <div class="grid2">
              <label>Start (s)<input id="textStart" type="number" min="0" step="0.1" value="0" /></label>
              <label>End (s)<input id="textEnd" type="number" min="0" step="0.1" value="2" /></label>
              <label>X (%)<input id="textX" type="number" min="0" max="100" step="1" value="12" /></label>
              <label>Y (%)<input id="textY" type="number" min="0" max="100" step="1" value="12" /></label>
            </div>
            <label>Text<input id="textValue" type="text" value="Click here" /></label>
            <button id="addTextBtn">Add Text</button>
          </div>
        </div>

        <div class="list-wrap">
          <div>
            <h3>Zoom Segments</h3>
            <ul id="zoomList" class="list"></ul>
          </div>
          <div>
            <h3>Text Overlays</h3>
            <ul id="textList" class="list"></ul>
          </div>
        </div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
