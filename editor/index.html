<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guide-Recorder Editor</title>
    <link rel="icon" href="./logo.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="crown-bar" aria-hidden="true"></div>
    <div id="effectEditor" class="effect-editor hidden">
      <div class="effect-editor-head">
        <strong id="effectEditorTitle">Edit</strong>
        <button id="effectEditorCloseBtn" class="ghost-btn" type="button">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="3" y1="3" x2="11" y2="11"/><line x1="11" y1="3" x2="3" y2="11"/></svg>
        </button>
      </div>
      <div id="effectEditorFields" class="effect-editor-fields"></div>
      <div class="effect-editor-actions">
        <button id="effectEditorDuplicateBtn" type="button">Duplicate</button>
        <button id="effectEditorDeleteBtn" type="button" class="remove-btn">Delete</button>
      </div>
    </div>
    <main class="app">
      <section class="panel controls">
        <div class="controls-header">
          <div class="brand">
            <h1>Guide Recorder</h1>
            <span class="badge">Editor</span>
          </div>
          <p id="status" class="status" aria-live="polite"></p>
        </div>
        <div class="row row-toolbar">
          <button id="exportFinalBtn" class="btn-primary" disabled>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 10v2.667A1.334 1.334 0 0 1 12.667 14H3.333A1.334 1.334 0 0 1 2 12.667V10"/><polyline points="4.667 6.667 8 10 11.333 6.667"/><line x1="8" y1="10" x2="8" y2="2"/></svg>
            Export Video
          </button>
          <button id="saveProjectBtn" disabled>
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12.5 13.5h-10a1 1 0 0 1-1-1v-10a1 1 0 0 1 1-1h7l4 4v7a1 1 0 0 1-1 1z"/><polyline points="10.5 1.5 10.5 5.5 4.5 5.5"/><rect x="4.5" y="8.5" width="6" height="4"/></svg>
            Save Project
          </button>
          <button id="undoTimelineBtn" type="button" title="Undo timeline action (Ctrl/Cmd+Z)" aria-label="Undo timeline action">
            Undo
          </button>
          <button id="redoTimelineBtn" type="button" title="Redo timeline action (Ctrl/Cmd+Shift+Z or Ctrl/Cmd+Y)" aria-label="Redo timeline action">
            Redo
          </button>
          <div class="toolbar-separator"></div>
          <label class="aspect-select" for="aspectPresetSelect">
            Aspect
            <select id="aspectPresetSelect" title="Output aspect ratio">
              <option value="source">Source</option>
              <option value="16:9">16:9</option>
              <option value="1:1">1:1</option>
              <option value="9:16">9:16</option>
              <option value="4:3">4:3</option>
              <option value="3:4">3:4</option>
              <option value="21:9">21:9</option>
            </select>
          </label>
          <div class="cursor-btn-wrap">
            <button id="cursorSettingsBtn" type="button">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 2l5.5 11 1.5-4.5L13.5 7z"/></svg>
              Cursor
            </button>
            <div id="cursorPopover" class="cursor-popover hidden">
              <div class="cursor-popover-head">
                <strong>Cursor Calibration</strong>
                <button id="cursorPopoverCloseBtn" class="ghost-btn" type="button">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="3" y1="3" x2="11" y2="11"/><line x1="11" y1="3" x2="3" y2="11"/></svg>
                </button>
              </div>
              <div class="grid2">
                <label>Offset X (px)<input id="cursorOffsetX" type="number" step="1" value="0" /></label>
                <label>Offset Y (px)<input id="cursorOffsetY" type="number" step="1" value="0" /></label>
              </div>
              <label>
                Cursor Motion
                <select id="cursorMotionMode">
                  <option value="raw">Raw (No Interpolation)</option>
                  <option value="linear">Linear</option>
                  <option value="spline">Spline (Click Anchored)</option>
                </select>
              </label>
              <label>
                Guide Points / Sec
                <input id="cursorSplineGuideHz" type="range" min="2" max="60" step="1" value="18" />
              </label>
              <div class="row">
                <label class="file-input">
                  Cursor Texture
                  <input id="cursorTextureInput" type="file" accept="image/png,image/webp,image/jpeg,image/svg+xml,image/*" />
                </label>
                <button id="cursorTextureClearBtn" type="button">Clear Texture</button>
              </div>
              <div class="grid2">
                <label>Hotspot X (px)<input id="cursorHotspotX" type="number" step="1" value="0" min="0" /></label>
                <label>Hotspot Y (px)<input id="cursorHotspotY" type="number" step="1" value="0" min="0" /></label>
              </div>
              <div class="grid2">
                <label>Key Overlay Size (px)<input id="keyPillFontSize" type="number" min="10" max="64" step="1" value="18" /></label>
                <label>Key Overlay X (%)<input id="keyPillXPct" type="number" min="0" max="100" step="0.1" value="98" /></label>
                <label>Key Overlay Y (%)<input id="keyPillYPct" type="number" min="0" max="100" step="0.1" value="2" /></label>
              </div>
              <canvas id="cursorPreviewCanvas" width="140" height="140" class="cursor-preview" title="Click to set cursor hotspot"></canvas>
            </div>
          </div>
          <div class="render-btn-wrap">
            <button id="renderSettingsBtn" type="button">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="4" x2="12" y2="4"/><line x1="3" y1="7.5" x2="12" y2="7.5"/><line x1="3" y1="11" x2="12" y2="11"/><circle cx="6" cy="4" r="1.2"/><circle cx="9" cy="7.5" r="1.2"/><circle cx="5" cy="11" r="1.2"/></svg>
              Render
            </button>
            <div id="renderSettingsPopover" class="cursor-popover render-popover hidden">
              <div class="cursor-popover-head">
                <strong>Render Settings</strong>
                <button id="renderSettingsCloseBtn" class="ghost-btn" type="button">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="3" y1="3" x2="11" y2="11"/><line x1="11" y1="3" x2="3" y2="11"/></svg>
                </button>
              </div>
              <div class="grid2">
                <label>
                  Transport
                  <select id="renderTransportSelect">
                    <option value="raw">RAW RGBA</option>
                    <option value="png">PNG</option>
                    <option value="jpeg">JPEG</option>
                  </select>
                </label>
                <label>
                  FPS Mode
                  <select id="renderFpsModeSelect">
                    <option value="source">Source FPS</option>
                    <option value="custom">Custom FPS</option>
                  </select>
                </label>
              </div>
              <label>
                Custom FPS
                <input id="renderFpsValueInput" type="number" min="1" max="240" step="0.001" value="60" />
              </label>
              <p class="settings-note">Source FPS uses probed input FPS. Custom FPS uses a fixed export FPS.</p>
            </div>
          </div>
          <label class="file-input">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 9.5v3a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-3"/><polyline points="4.5 5 7.5 2 10.5 5"/><line x1="7.5" y1="2" x2="7.5" y2="10"/></svg>
            Load Project
            <input id="loadProjectInput" type="file" accept="application/json" />
          </label>
          <label class="file-input">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5.5 3 12.5 7.5 5.5 12 5.5 3"/></svg>
            Load Video
            <input id="loadVideoInput" type="file" accept="video/webm,video/mp4,video/*" />
          </label>
        </div>
        <div id="exportProgress" class="export-progress hidden" aria-live="polite" aria-label="Export progress">
          <div class="export-progress-track">
            <div id="exportProgressFill" class="export-progress-fill"></div>
          </div>
          <span id="exportProgressLabel" class="export-progress-label">0%</span>
        </div>

      </section>

      <section class="panel preview-wrap">
        <div class="preview-viewport" id="previewViewport">
          <div class="preview-stage" id="previewStage">
            <video id="previewVideo" playsinline></video>
            <canvas id="overlayCanvas"></canvas>
            <div id="liveKeyPill" class="key-pill hidden"></div>
          </div>
        </div>
        <div class="preview-controls">
          <button id="playPauseBtn">Play</button>
          <input id="seekBar" type="range" min="0" max="1000" step="1" value="0" />
          <span id="timeLabel">00:00 / 00:00</span>
        </div>
        <div class="effects-timeline" id="effectsTimeline">
          <div class="timeline-header">
            <span>Effects Timeline</span>
            <span class="muted">Click to seek</span>
          </div>
          <div class="timeline-surface" id="timelineSurface">
            <div class="timeline-lane">
              <span class="timeline-name">Trim</span>
              <div class="timeline-track" id="trimTrack"></div>
            </div>
            <div class="timeline-lane">
              <span class="timeline-name">Zoom</span>
              <div class="timeline-track" id="zoomTrack">
                <span id="zoomGhost" class="timeline-ghost zoom hidden"></span>
                <button id="zoomAddBtn" class="lane-add-btn" type="button" title="Add zoom">+</button>
              </div>
            </div>
            <div class="timeline-lane">
              <span class="timeline-name">Text</span>
              <div class="timeline-track" id="textTrack">
                <span id="textGhost" class="timeline-ghost text hidden"></span>
                <button id="textAddBtn" class="lane-add-btn" type="button" title="Add text">+</button>
              </div>
            </div>
            <div class="timeline-playhead" id="timelinePlayhead"></div>
          </div>
        </div>
      </section>

    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
