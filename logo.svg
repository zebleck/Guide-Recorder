<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A2D3E" />
      <stop offset="100%" stop-color="#14151E" />
    </linearGradient>

    <!-- Cursor Gradient -->
    <linearGradient id="cursor-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>

    <!-- Selection Box Glow -->
    <filter id="box-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Cursor Drop Shadow -->
    <filter id="cursor-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="8" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <!-- Red Dot Glow -->
    <filter id="dot-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- App Icon Base (Squircle) -->
  <rect x="32" y="32" width="448" height="448" rx="100" ry="100" fill="url(#bg-gradient)" />
  <!-- Inner Subtle Border -->
  <rect x="34" y="34" width="444" height="444" rx="98" ry="98" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="4" />

  <!-- Dashed Selection Area -->
  <rect x="110" y="140" width="292" height="210" rx="20" ry="20" 
        fill="none" 
        stroke="#4facfe" 
        stroke-width="12" 
        stroke-dasharray="24 16" 
        stroke-linecap="round"
        filter="url(#box-glow)" />

  <!-- Corner Handles for Selection Area -->
  <!-- Top Left -->
  <circle cx="110" cy="140" r="10" fill="#ffffff" />
  <!-- Bottom Left -->
  <circle cx="110" cy="350" r="10" fill="#ffffff" />
  <!-- Top Right -->
  <circle cx="402" cy="140" r="10" fill="#ffffff" />

  <!-- The Recording Dot (Bottom Right) -->
  <!-- Outer pulse ring -->
  <circle cx="402" cy="350" r="32" fill="#ff4b4b" fill-opacity="0.25" filter="url(#dot-glow)" />
  <!-- Inner solid dot -->
  <circle cx="402" cy="350" r="20" fill="#ff2a2a" />
  <!-- White outline ring -->
  <circle cx="402" cy="350" r="20" fill="none" stroke="#ffffff" stroke-width="4" />

  <!-- The Mouse Cursor -->
  <g transform="translate(200, 185)" filter="url(#cursor-shadow)">
    <!-- Outline / Stroke -->
    <path d="M 10 10 L 10 90 L 30 70 L 47 106 L 60 100 L 43 64 L 70 64 Z" 
          fill="none" stroke="#14151E" stroke-width="12" stroke-linejoin="round" />
    <!-- Inner Fill -->
    <path d="M 10 10 L 10 90 L 30 70 L 47 106 L 60 100 L 43 64 L 70 64 Z" 
          fill="url(#cursor-grad)" />
  </g>
</svg>
