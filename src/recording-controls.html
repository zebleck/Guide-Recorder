<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Recording Controls</title>
    <link rel="stylesheet" href="./recording-controls.css" />
  </head>
  <body>
    <main class="dock">
      <span id="timeLabel" class="time" aria-live="polite">00:00</span>
      <button id="pauseBtn" class="icon-btn pause" title="Pause recording" aria-label="Pause recording">
        <span class="bars"><span></span><span></span></span>
      </button>
      <button id="stopBtn" class="icon-btn stop" title="Stop and save recording" aria-label="Stop and save recording">
        <span class="square"></span>
      </button>
      <button id="cancelBtn" class="icon-btn cancel" title="Cancel and discard recording" aria-label="Cancel and discard recording">
        <span class="x"></span>
      </button>
    </main>
    <script src="./recording-controls.js" defer></script>
  </body>
</html>
